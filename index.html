<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Fund Portal</title>
    <style>
        /* Define your custom OTF font here */
        @font-face {
            font-family: 'CustomOTFFont';
            src: url('apercu_regular_pro.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary: #003d73;
            --primary-hover: #2563eb;
            --bg: #003d73;          /* Background */
            --card-bg: #002a4f;     /* Trim / category bubbles */
            --inner-bg: #ffffff;    /* Inner background */
            --border: #001b35;
            --text-main: #ffffff;   /* White text */
            --text-dark: #000000;   /* Black text */
            --text-muted: #cbd5e1;
            --diff-color: #dc2626;  /* Red for differences */
        }

        body {
            font-family: 'CustomOTFFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        /* Ensure inputs, selects, options, buttons, and tables all pull the custom font */
        h1, h2, h3, input, select, option, button, th, td, label {
            font-family: 'CustomOTFFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;               /* Inside background is white */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 12px solid #002a4f;         /* Rounded trim outline set to #002a4f */
            box-sizing: border-box;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .tab-buttons button {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s;
            margin-top: 0;
            font-family: inherit;
        }

        .tab-buttons button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: var(--text-dark); /* Main title to black */
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--text-main);
        }

        .form-section {
            margin-bottom: 25px;
            padding: 20px;
            background: var(--bg);             /* Bottom of the card is the main background (#003d73) */
            border: 1px solid #001b35;
            border-radius: 8px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3); /* Drop shadow for the cards */
            box-sizing: border-box;
        }

        .form-section h3 {
            margin: -20px -20px 15px -20px;    /* Pulls header to the card's outer edges */
            padding: 12px 20px;
            font-size: 1.1rem;
            color: #ffffff;                    /* Category title text is white */
            background: #002a4f;               /* Top header color */
            border-top-left-radius: 7px;
            border-top-right-radius: 7px;
            font-family: 'CustomOTFFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-subtitle {
            font-size: 0.8rem;
            font-weight: normal;
            color: var(--text-muted);
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);           /* White text for readability on the dark blue card */
            font-family: 'CustomOTFFont', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        /* Responsive Filter Grids */
        .filter-grid-primary {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 15px;
            align-items: end;
        }

        .filter-grid-secondary {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        @media (max-width: 650px) {
            .filter-grid-primary, .filter-grid-secondary {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        input, select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
            background-color: var(--inner-bg); /* Inner background to white */
            color: var(--text-dark);            /* Text inside inputs to black */
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Custom Decimal Wrapper for Bags and Tills (Fixed 150 prefix + editable 2 decimals) */
        .custom-decimal-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--inner-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .custom-decimal-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .custom-decimal-prefix {
            padding: 10px 0 10px 10px;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1rem;
            user-select: none;
            background-color: transparent;
        }

        .custom-decimal-input {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            padding: 10px 10px 10px 2px !important;
            font-size: 1rem !important;
            background: transparent !important;
            color: var(--text-dark) !important;
            width: 100%;
        }

        .conditional-group {
            display: none;
        }

        .conditional-group.visible {
            display: flex;
        }

        button.action-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
            font-family: inherit;
            box-sizing: border-box;
        }

        button.action-btn:hover {
            background-color: var(--primary-hover);
        }

        button.action-btn:disabled {
            background-color: #334155;
            cursor: not-allowed;
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: var(--inner-bg); /* Inner table background to white */
            border-radius: 6px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
            color: var(--text-dark); /* Table data text to dark for readability on white background */
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: var(--text-dark);
        }

        #success-message {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        #form-error-message {
            display: none;
            background-color: #fee2e2;
            border: 1px solid #ef4444;
            color: #b91c1c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
        }
    </style>
</head>
